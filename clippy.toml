# Complexity budget for the Rust workspace.
#
# Mirrors the Python radon gate at the C-rank cutoff. A function over
# this threshold is a code smell to look at before merging, not
# necessarily a bug. tn-core currently carries no
# `#[allow(clippy::cognitive_complexity)]`: the high-complexity functions
# were decomposed rather than grandfathered. A new function over the
# threshold must either land below it or earn an explicit allow with a
# justification comment.
#
# The CI step (`cargo clippy --workspace -- -D clippy::cognitive_complexity`)
# treats every fresh hit as a hard failure.
cognitive-complexity-threshold = 15
