name: release-extension

# Triggered on a chrome-specific tag (ext-v*), separate from the Python
# release pipeline so the SDK and the extension release on independent
# cadences. Builds a zip of extensions/tn-decrypt/ and attaches it to
# a GitHub Release.
#
# Users install with:
#   1. Download the zip from the Release page
#   2. Unzip
#   3. chrome://extensions  → enable Developer mode  → Load unpacked  → point at the unzipped dir
#
# Or wait for the Chrome Web Store listing (separate, manual submission).

on:
  push:
    tags:
      - 'ext-v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create releases + upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('extensions/tn-decrypt/manifest.json'))['version'])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Manifest version: ${VERSION}"
          echo "Tag: ${TAG}"

      - name: Verify manifest version matches tag
        run: |
          # The tag is `ext-v<X>` and the manifest says `<X>` — they must agree.
          EXPECTED="ext-v${{ steps.version.outputs.version }}"
          if [ "${{ steps.version.outputs.tag }}" != "${EXPECTED}" ]; then
            echo "::error::tag '${{ steps.version.outputs.tag }}' does not match manifest version '${{ steps.version.outputs.version }}' (expected '${EXPECTED}')"
            exit 1
          fi

      - name: Setup Node (for ts-sdk build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        # ts-sdk imports tn-wasm at file:../crypto/tn-wasm/pkg, which is
        # generated by wasm-pack from the Rust crate. Without this step
        # tsc fails with "Cannot find module 'tn-wasm'" before the
        # vendor copy runs. Mirrors the ci.yml ts-tests job.
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build tn-wasm (nodejs target)
        working-directory: crypto/tn-wasm
        run: wasm-pack build --target nodejs --release

      - name: Build SDK + vendor into extension
        # tools/build-extension.sh compiles ts-sdk/, copies dist/core/
        # encoding.js + emk.js into extensions/tn-decrypt/vendor/sdk-core/,
        # and verifies no out-of-tree imports remain. Without this step
        # the published zip ships a unlock.js that imports from
        # ../../ts-sdk/dist/core/... — a path that doesn't exist when
        # the user unzips and points Chrome at the directory.
        run: |
          cd ts-sdk
          npm ci
          cd ..
          bash tools/build-extension.sh

      - name: Build extension zip
        run: |
          # Strip test fixtures + README from the bundle. Chrome doesn't
          # care, but they bloat the download. The vendor/sdk-core/
          # directory MUST be included — that's the audited EMK code the
          # extension imports.
          cd extensions/tn-decrypt
          zip -r "../../tn-decrypt-${{ steps.version.outputs.version }}.zip" . \
            --exclude "test/*" \
            --exclude "*.md"
          cd ../..
          ls -la "tn-decrypt-${{ steps.version.outputs.version }}.zip"

      - name: Verify zip contains the vendored SDK
        # Belt-and-suspenders check: if the build step above silently
        # failed to populate vendor/, we'd publish a broken zip again.
        # Fail loudly here instead.
        run: |
          ZIP="tn-decrypt-${{ steps.version.outputs.version }}.zip"
          if ! unzip -l "$ZIP" | grep -q 'vendor/sdk-core/encoding.js'; then
            echo "::error::$ZIP missing vendor/sdk-core/encoding.js"
            unzip -l "$ZIP"
            exit 1
          fi
          if ! unzip -l "$ZIP" | grep -q 'vendor/sdk-core/emk.js'; then
            echo "::error::$ZIP missing vendor/sdk-core/emk.js"
            unzip -l "$ZIP"
            exit 1
          fi
          echo "OK: vendored SDK present in zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: tn-decrypt extension ${{ steps.version.outputs.version }}
          body: |
            **TN Decrypt** Chrome extension — decrypts TN envelopes in any browser tab using a local kit.

            ## Install (manual, until Chrome Web Store listing is live)

            1. Download `tn-decrypt-${{ steps.version.outputs.version }}.zip` below.
            2. Unzip into a directory.
            3. Open `chrome://extensions`, toggle **Developer mode** (top-right).
            4. Click **Load unpacked**, point at the unzipped directory.

            The extension scans pages for TN ciphertexts and rewrites them in-place using whatever kits you've imported via the popup. Keys never leave the browser.

            ## Test page

            Local fixture at `test-page.html` (in the source tree) shows a sample envelope; load it via `file:///` after install to confirm decryption.
          files: |
            tn-decrypt-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'a') || contains(steps.version.outputs.version, 'b') || contains(steps.version.outputs.version, 'rc') }}
