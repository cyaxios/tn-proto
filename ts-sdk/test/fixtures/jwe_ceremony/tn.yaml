ceremony:
  id: local_bdb501cd
  mode: linked
  linked_vault: https://vault.tn-proto.org
  linked_project_id: ''
  cipher: jwe
  sign: true
  admin_log_location: ./.tn/tn/admin/default.ndjson
  log_level: debug
vault:
  enabled: false
  url: https://vault.tn-proto.org
  linked_project_id: ''
  autosync: false
  sync_interval_seconds: 600
logs:
  path: ./.tn/tn/logs/tn.ndjson
keystore:
  path: ./.tn/tn/keys
device:
  device_identity: did:key:z6Mkv1kpGDZEXx7bXusbhP9cxnwC8aq6JhfFm3WzxprTLUi2
handlers:
- kind: file.rotating
  name: main
  path: ./.tn/tn/logs/tn.ndjson
  max_bytes: 5242880
  backup_count: 5
  rotate_on_init: false
- kind: stdout
public_fields:
- timestamp
- event_id
- event_type
- level
- server_did
- user_did
- request_id
- method
- path
- ceremony_id
- cipher
- device_identity
- created_at
- group
- publisher_identity
- added_at
- leaf_index
- recipient_identity
- kit_sha256
- slot
- issued_to
- generation
- previous_kit_sha256
- old_pool_size
- new_pool_size
- rotated_at
- peer_identity
- package_sha256
- compiled_at
- absorbed_at
- vault_identity
- project_id
- linked_at
- reason
- unlinked_at
- policy_uri
- content_hash
- event_types_covered
- policy_text
- envelope_event_id
- envelope_device_identity
- envelope_event_type
- envelope_sequence
- invalid_reasons
default_policy: private
groups:
  default:
    policy: private
    cipher: jwe
    recipients:
    - recipient_identity: did:key:z6Mkv1kpGDZEXx7bXusbhP9cxnwC8aq6JhfFm3WzxprTLUi2
  tn.agents:
    policy: private
    cipher: btn
    recipients:
    - recipient_identity: did:key:z6Mkv1kpGDZEXx7bXusbhP9cxnwC8aq6JhfFm3WzxprTLUi2
    fields:
    - instruction
    - use_for
    - do_not_use_for
    - consequences
    - on_violation_or_error
    - policy
    auto_populated_by_policy: true
fields: {}
llm_classifier:
  enabled: false
  provider: ''
  model: ''
